<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .container { text-align: center; padding: 40px; }
    h1 { font-size: 72px; margin-bottom: 20px; }
    p { font-size: 18px; margin-bottom: 30px; color: #f8f9fa; }
    a { display: inline-block; padding: 12px 24px; background: white; color: #667eea; border-radius: 6px; text-decoration: none; font-weight: 600; transition: transform 0.2s; }
    a:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>Page not found</p>
    <a href="/">Go home</a>
  </div>
</body>
</html>
