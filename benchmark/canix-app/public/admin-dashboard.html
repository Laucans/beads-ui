<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>Admin — Canix</title>
<style>body{font-family:sans-serif;margin:0}header{background:#1e3a5f;color:white;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center}main{padding:2rem}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:1rem}.card{background:white;padding:1.5rem;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.1)}.card h3{margin:0 0 .5rem;color:#555;font-size:.85rem;text-transform:uppercase}.card p{margin:0;font-size:2rem;font-weight:bold;color:#1e3a5f}button{background:#ef4444;color:white;border:none;padding:.5rem 1rem;border-radius:4px;cursor:pointer}</style>
</head><body>
<header><span>Canix — <span id="uname"></span> [Admin]</span><button onclick="logout()">Déconnexion</button></header>
<main><h2>Dashboard Administrateur</h2><div class="grid">
<div class="card"><h3>Utilisateurs</h3><p>24</p></div>
<div class="card"><h3>Tickets ouverts</h3><p>12</p></div>
<div class="card"><h3>Devis en attente</h3><p>5</p></div>
</div></main>
<script>
const token=localStorage.getItem('token');
if(!token)window.location.href='login.html';
fetch('/auth/me',{headers:{Authorization:'Bearer '+token}}).then(r=>r.json()).then(d=>{
  if(!d.user||d.user.role!=='admin'){localStorage.clear();window.location.href='login.html';return;}
  document.getElementById('uname').textContent=d.user.email;
}).catch(()=>{localStorage.clear();window.location.href='login.html';});
function logout(){localStorage.clear();window.location.href='login.html';}
</script></body></html>
