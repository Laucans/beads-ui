<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><title>Connexion — Canix App</title>
<style>body{font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background:#f5f5f5}.card{background:white;padding:2rem;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1);width:320px}h1{margin:0 0 1.5rem;font-size:1.4rem}input{width:100%;padding:.6rem;margin-bottom:1rem;border:1px solid #ccc;border-radius:4px;box-sizing:border-box}button{width:100%;padding:.7rem;background:#2563eb;color:white;border:none;border-radius:4px;cursor:pointer;font-size:1rem}#error{color:red;font-size:.85rem;margin-top:.5rem;display:none}</style>
</head><body><div class="card"><h1>Connexion</h1>
<input type="email" id="email" placeholder="Email"/>
<input type="password" id="password" placeholder="Mot de passe"/>
<button onclick="login()">Se connecter</button><p id="error"></p></div>
<script>
async function login(){
  const email=document.getElementById('email').value,password=document.getElementById('password').value,err=document.getElementById('error');
  err.style.display='none';
  try{
    const res=await fetch('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const data=await res.json();
    if(!res.ok){err.textContent=data.error||'Erreur';err.style.display='block';return;}
    localStorage.setItem('token',data.token);localStorage.setItem('role',data.user.role);
    const d={admin:'admin-dashboard.html',employe:'employe-dashboard.html',client:'client-dashboard.html'};
    window.location.href=d[data.user.role]||'client-dashboard.html';
  }catch(e){err.textContent='Erreur réseau';err.style.display='block';}
}
</script></body></html>
