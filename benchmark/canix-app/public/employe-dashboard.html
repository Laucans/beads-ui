<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>Employé — Canix</title>
<style>body{font-family:sans-serif;margin:0}header{background:#065f46;color:white;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center}main{padding:2rem}.card{background:white;padding:1.5rem;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.1);margin-bottom:1rem}button{background:#ef4444;color:white;border:none;padding:.5rem 1rem;border-radius:4px;cursor:pointer}</style>
</head><body>
<header><span>Canix — <span id="uname"></span> [Employé]</span><button onclick="logout()">Déconnexion</button></header>
<main><h2>Dashboard Employé</h2>
<div class="card"><h3>Tickets assignés</h3><p>Vous avez 3 tickets ouverts.</p></div>
<div class="card"><h3>Devis à traiter</h3><p>2 devis en attente de validation.</p></div>
</main>
<script>
const token=localStorage.getItem('token');
if(!token)window.location.href='login.html';
fetch('/auth/me',{headers:{Authorization:'Bearer '+token}}).then(r=>r.json()).then(d=>{
  if(!d.user||d.user.role!=='employe'){localStorage.clear();window.location.href='login.html';return;}
  document.getElementById('uname').textContent=d.user.email;
}).catch(()=>{localStorage.clear();window.location.href='login.html';});
function logout(){localStorage.clear();window.location.href='login.html';}
</script></body></html>
